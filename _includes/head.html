<!-- ===== LaTeX math (MathJax 3) =====================================
     kramdown (math_engine: mathjax) turns $$...$$ into
     <script type="math/tex">...</script> tags. That protects the math from
     Markdown mangling, but MathJax 3 does not read those tags, so we rewrite
     them into \(...\) / \[...\] right before MathJax typesets the page.
     Write math as $...$ in your notes — tools/sync.ps1 converts it to $$...$$.
================================================================== -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)']],
    displayMath: [['\\[', '\\]']],
    processEscapes: true,
    tags: 'none',
    macros: {
      RR: '{\\mathbb{R}}',
      dd: '{\\mathrm{d}}',
      pmatrix: ['{\\begin{pmatrix}#1\\end{pmatrix}}', 1],
      bmatrix: ['{\\begin{bmatrix}#1\\end{bmatrix}}', 1]
    }
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  },
  startup: {
    pageReady: function () {
      document.querySelectorAll('script[type^="math/tex"]').forEach(function (el) {
        var display = el.type.indexOf('mode=display') > -1;
        var tex = el.textContent;
        var node = document.createElement(display ? 'div' : 'span');
        if (display) { node.className = 'math-display'; }
        node.textContent = display ? '\\[' + tex + '\\]' : '\\(' + tex + '\\)';
        el.parentNode.replaceChild(node, el);
      });
      return MathJax.startup.defaultPageReady();
    }
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
